name: Stock Data Harvest

on:
  schedule:
    # Every 30 min during US extended market hours (~4am-8pm ET), Mon-Fri
    # GitHub cron uses UTC. 9-23 UTC covers ~4am-7pm ET (winter) / 5am-7pm ET (summer)
    # Stays well under 2,000 Actions min/month free tier (~1,320 min/month usage)
    - cron: '*/30 9-23 * * 1-5'

  # Manual trigger button in the Actions tab
  workflow_dispatch:

  # Run on every push to main for quick iteration
  push:
    branches: [main]
    paths:
      - 'harvester/**'
      - '.github/workflows/harvest.yml'

# Required so the action can commit data back to the repo
permissions:
  contents: write

concurrency:
  group: harvest
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: harvester/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r harvester/requirements.txt

      - name: Run harvester
        env:
          # Optional: set in repo Settings → Secrets → Actions for better news
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python harvester/harvest.py

      - name: Show what changed
        run: |
          echo "=== Data files ==="
          ls -lh docs/data/ || true
          echo ""
          echo "=== Status ==="
          cat docs/data/status.json || true

      - name: Commit and push updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add docs/data/
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "📊 Harvest: $TIMESTAMP"
            git push
          fi
